<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary meta tags (title, description, robots, canonical, OG, Twitter) are managed dynamically by the SEOHead React component via react-helmet-async -->
    <meta name="author" content="Canary Detect" />

    <!-- Favicon: Modern 2026 Minimal Setup (cache-busted) -->
    <!-- NOTE: Chrome can persist favicon caches even in Incognito; versioned URLs force a refetch. -->
    <link rel="icon" href="/icon.svg?v=2026-02-04" type="image/svg+xml" sizes="any">
    <link rel="icon" href="/favicon-32x32.png?v=2026-02-04" type="image/png" sizes="32x32">
    <link rel="shortcut icon" href="/favicon.ico?v=2026-02-04">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2026-02-04">
    <link rel="manifest" href="/manifest.webmanifest?v=2026-02-04">
    <meta name="theme-color" content="#0f172a">
    
    <!-- 
      NOTE: Hero image preload is handled dynamically by HeroSlider component.
      Static preload removed because Vite transforms image paths at build time.
      The HeroImage component uses fetchpriority="high" and loading="eager" for LCP.
    -->
    
    <!-- Preconnect to external resources - prioritize fonts for LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- DNS prefetch for analytics if used -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- Inline Critical CSS for instant first paint + font-display optimization -->
    <style>
      /* Prevent flash of unstyled content and show instant loading state */
      body { 
        margin: 0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
      }
      #root:empty::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        z-index: 9999;
      }
      #root:empty::after {
        content: 'Loading Canary Detect...';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #f97316;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        z-index: 10000;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>

    <!-- Geographic Meta Tags -->
    <meta name="geo.region" content="ES-CN" />
    <meta name="geo.placename" content="Lanzarote, Canary Islands" />
    <meta name="geo.position" content="28.9637;-13.5477" />
    <meta name="ICBM" content="28.9637, -13.5477" />

    <!-- Structured Data is managed dynamically by React components (LocalBusinessSchema, BreadcrumbSchema, FAQSchema, etc.) -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
