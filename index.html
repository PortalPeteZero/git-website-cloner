<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <!-- These static tags are required as base targets for SEOHead.tsx, which uses
         document.querySelector() to update them per-page via useEffect.
         SEOHead cannot create tags — it can only update existing ones.
         Pages using React Helmet directly (PlumbingServiceDetail) must NOT
         duplicate these via Helmet — use SEOHead instead. -->
    <title>Canary Detect | Leak Detection Lanzarote</title>
    <meta name="description" content="Expert leak detection services in Lanzarote. Water leaks, pool leaks, underground pipes. Fast response across Lanzarote and the Canary Islands." />
    <meta name="keywords" content="leak detection Lanzarote, water leak Lanzarote, water leak detection Lanzarote, leak survey Lanzarote, find water leak Lanzarote, water leak detection Canary Islands, pool leak detection Lanzarote, leak repair Lanzarote, underground water leak detection, swimming pool leak detection, hidden water leak detection, Lanzarote water leak specialist" />
    <meta name="author" content="Canary Detect" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <!-- og:title, og:url, og:description are updated per-page by SEOHead.tsx -->
    <meta property="og:title" content="Canary Detect | Leak Detection Lanzarote" />
    <meta property="og:description" content="Expert leak detection services in Lanzarote. Water leaks, pool leaks, underground pipes. Fast response across Lanzarote and the Canary Islands." />
    <meta property="og:url" content="https://canary-detect.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://canary-detect.com/og-image.jpg?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:site_name" content="Canary Detect" />

    <!-- Twitter -->
    <!-- twitter:title, twitter:url, twitter:description are updated per-page by SEOHead.tsx -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Canary Detect | Leak Detection Lanzarote" />
    <meta name="twitter:description" content="Expert leak detection services in Lanzarote. Water leaks, pool leaks, underground pipes. Fast response across Lanzarote and the Canary Islands." />
    <meta name="twitter:url" content="https://canary-detect.com/" />
    <meta name="twitter:image" content="https://canary-detect.com/og-image.jpg?v=2" />

    <!-- Geographic Meta Tags -->
    <meta name="geo.region" content="ES-CN" />
    <meta name="geo.placename" content="Lanzarote, Canary Islands" />
    <meta name="geo.position" content="28.9637;-13.5477" />
    <meta name="ICBM" content="28.9637, -13.5477" />
    <meta name="theme-color" content="#0f172a">

    <!-- Canonical is set dynamically per-page by React components -->

    <!-- Favicon -->
    <link rel="icon" href="/icon.svg?v=2026-02-04" type="image/svg+xml" sizes="any">
    <link rel="icon" href="/favicon-32x32.png?v=2026-02-04" type="image/png" sizes="32x32">
    <link rel="shortcut icon" href="/favicon.ico?v=2026-02-04">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2026-02-04">
    <link rel="manifest" href="/manifest.webmanifest?v=2026-02-04">
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- 
      NOTE: Hero image preload is handled dynamically by HeroSlider component.
      Static preload removed because Vite transforms image paths at build time.
      The HeroImage component uses fetchpriority="high" and loading="eager" for LCP.
    -->

    <!-- Inline Critical CSS for instant first paint -->
    <style>
      body { 
        margin: 0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
      }
      #root:empty::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        z-index: 9999;
      }
      #root:empty::after {
        content: 'Loading Canary Detect...';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #f97316;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        z-index: 10000;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>

    <!-- LocalBusiness structured data is handled dynamically and bilingually by LocalBusinessSchema.tsx via React Helmet -->
  </head>

  <body>
    <div id="root">
      <!-- Full pre-rendering for crawlers is handled by LovableHTML proxy. Noscript fallback not required. -->
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
